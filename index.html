<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 — Live Stream</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════ -->
<!--  LAYAR 1 — MENU / JADWAL  (Mastercard cream)          -->
<!-- ════════════════════════════════════════════════════ -->
<section id="menu-screen" class="menu-screen">

    <!-- Floating nav pill -->
    <nav class="nav-pill">
        <div class="nav-logo">
            <span class="nav-ball">⚽</span>
            <span class="nav-title">World Cup 2026</span>
        </div>
        <div class="nav-tabs">
            <button class="tab active" data-tab="today">Hari Ini</button>
            <button class="tab" data-tab="schedule">Jadwal</button>
            <button class="tab" data-tab="results">Hasil</button>
        </div>
        <div class="nav-clock" id="clock"></div>
    </nav>

    <!-- Hero eyebrow -->
    <header class="menu-hero">
        <div class="eyebrow"><span class="dot"></span>FIFA WORLD CUP 2026</div>
        <h1 class="menu-h1">Jadwal &amp; Live Stream</h1>
        <p class="menu-sub">Pilih pertandingan untuk mulai menonton.</p>
    </header>

    <!-- Match grid -->
    <main class="menu-main">
        <div id="match-list" class="match-grid"></div>
    </main>
</section>

<!-- ════════════════════════════════════════════════════ -->
<!--  LAYAR 2 — STREAM PLAYER  (dark)                      -->
<!-- ════════════════════════════════════════════════════ -->
<section id="stream-screen" class="stream-screen" style="display:none;">

    <!-- Top bar: back button -->
    <div class="stream-topbar">
        <button class="back-btn" onclick="showMenu()">← Kembali ke Jadwal</button>
    </div>

    <div class="player-wrap" id="player-wrap">
        <div id="player-placeholder" class="player-placeholder">
            <div class="ph-ball">⚽</div>
            <h2>World Cup 2026</h2>
            <p>Pilih stream di bawah untuk mulai menonton</p>
        </div>
        <video id="video-player" controls playsinline preload="none"></video>
        <iframe id="iframe-player" allowfullscreen allow="autoplay; fullscreen; encrypted-media" referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- Stream source buttons + custom URL -->
    <div id="stream-bar" class="stream-bar" style="display:none;">
        <!-- Match code override -->
        <div class="code-wrap">
            <span class="code-label">Code</span>
            <input id="code-input" type="text" class="code-input" placeholder="X_VS_Y" title="Match code dari reference site (cek saat match live)" />
            <button class="code-btn" onclick="applyMatchCode()">↺</button>
        </div>
        <div class="divider-v"></div>
        <!-- Dropdown stream selector -->
        <div class="stream-select-wrap">
          <select id="stream-select" onchange="onStreamSelect(this)">
            <option value="">— Pilih Stream —</option>
          </select>
        </div>
        <div class="divider-v"></div>
        <!-- Manual URL override -->
        <div class="custom-url-wrap">
            <input id="url-input" type="text" class="url-input" placeholder="Atau paste URL langsung (m3u8 / iframe)…" />
            <button class="url-btn" onclick="loadCustomUrl()">▶</button>
        </div>
    </div>

    <!-- Match info bar -->
    <div id="match-info" class="match-info" style="display:none;">
        <div class="score-row">
            <div class="team-block home-block">
                <span class="team-flag" id="home-flag"></span>
                <span class="team-name" id="home-name"></span>
            </div>
            <div class="score-block">
                <div class="score-num" id="score-num">VS</div>
                <div class="score-status" id="score-status"></div>
            </div>
            <div class="team-block away-block">
                <span class="team-flag" id="away-flag"></span>
                <span class="team-name" id="away-name"></span>
            </div>
        </div>
        <div class="match-meta" id="match-meta"></div>
    </div>
</section>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/matches.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
